<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <meta name="description" content="A placeholder website for hosting various projects in the future.">
    <title>A Website</title>
    <style>
        body {
            font-family: Garamond, serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-wrap: break-word;
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            min-width: 330px;
        }

        .diagonal-gradient {
            background: linear-gradient(177deg, antiqueWhite 0 75%, transparent 75.2% 100%);
            padding: 5em 1em 10em;
            color: black;
        }

        h1 {
            font-size: 5em;
        }

        .github-logo {
            width: 1em;
            vertical-align: text-top;
        }

        main {
            flex-grow: 1;
            font-size: 2em;
            padding: 0 10%;
        }

        footer {
            padding: 1em;
        }

        footer a {
            font-weight: bold;
            text-decoration: unset;
            color: unset;
        }
    </style>
</head>
<body>
<div class="diagonal-gradient">
    <h1>A Website.</h1>
</div>
<main>
<p>For the moment, this website is a placeholder.</p>
<p>I will use it when I need to quickly test if something works on a real remote server, or if I ever need a website.</p>
</main>
<footer>
    This website is open source. See the source or file an issue on
    <a href="https://github.com/pwbriggs/pwbriggs.github.io/">
        <img class="github-logo" src="/static/img/github-mark-white.svg" alt=""> GitHub
    </a>
</footer>
</body>
</html>
