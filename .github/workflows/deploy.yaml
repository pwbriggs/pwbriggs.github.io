name: Deploy to Pages

on:
  workflow_call: ~

jobs:
  setup-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Pages
        uses: actions/configure-pages@v3
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: setup-pages
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v1
